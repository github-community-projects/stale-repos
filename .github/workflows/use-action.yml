---
name: stale repo identifier
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "3 2 1 * *"
permissions:
  contents: read
jobs:
  build:
    name: stale repo identifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run stale_repos tool
        uses: docker://ghcr.io/github-community-projects/stale_repos:v9@sha256:374277cb9863651aeebd9a45f09083aaec013e72982d217bf4b058baa60bbc4a
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ORGANIZATION: github
          INACTIVE_DAYS: 1
      - name: Create issue
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710
        with:
          title: Stale repository report
          content-filepath: ./stale_repos.md
          assignees: zkoppert
